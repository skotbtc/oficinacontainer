document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-display: swap;\n  src: url(\"65aee00f-ee82-49bf-84e1-b22f04da67bf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html,body { margin:0; height:100%; background:#1b1d20; overflow:hidden; }\n  #app { position:fixed; inset:0; }\n  canvas { display:block; }\n  #ui {\n    position:fixed; top:0; left:0; right:0; padding:20px 24px; pointer-events:none;\n    display:flex; flex-direction:column; gap:10px; z-index:2;\n  }\n  #ui h1 { margin:0; font:800 20px 'Archivo',sans-serif; color:#eceef1; letter-spacing:-0.01em; }\n  #ui p { margin:0; font:11px 'IBM Plex Mono',monospace; color:#8a919c; }\n  #views { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }\n  #views button {\n    pointer-events:auto; cursor:pointer; border:1px solid #33363c; background:#212327; color:#c9ced6;\n    font:500 11px 'IBM Plex Mono',monospace; letter-spacing:0.06em; text-transform:uppercase;\n    padding:8px 14px; border-radius:6px;\n  }\n  #views button:hover { border-color:#e07a3f; color:#e07a3f; }\n  #views button.active { background:#e07a3f; border-color:#e07a3f; color:#1b1d20; }\n  #hint {\n    position:fixed; left:24px; bottom:20px; z-index:2; pointer-events:none;\n    font:11px 'IBM Plex Mono',monospace; color:#7d8590; background:rgba(27,29,32,0.75); padding:8px 12px; border-radius:6px;\n  }\n  #back {\n    position:fixed; right:24px; bottom:20px; z-index:2;\n    font:500 11px 'IBM Plex Mono',monospace; letter-spacing:0.06em; text-transform:uppercase;\n    color:#e07a3f; text-decoration:none; background:rgba(27,29,32,0.75); border:1px solid #33363c;\n    padding:8px 12px; border-radius:6px;\n  }\n  #back:hover { border-color:#e07a3f; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"app\"><\u002Fdiv>\n<div id=\"ui\">\n  <h1>Container 40′ HC — Interior 3D<\u002Fh1>\n  <p>Layout 1a · bancada + P-51 e jatos na parede esquerda · fuselagens T-6 na direita · estante e frigobar no fundo<\u002Fp>\n  <div id=\"views\">\n    <button data-v=\"porta\" class=\"active\">Vista da porta<\u002Fbutton>\n    <button data-v=\"bancada\">Bancada<\u002Fbutton>\n    <button data-v=\"esquerda\">Parede esquerda<\u002Fbutton>\n    <button data-v=\"direita\">Parede direita<\u002Fbutton>\n    <button data-v=\"fundo\">Fundo<\u002Fbutton>\n    <button data-v=\"cima\">Vista de cima<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div id=\"hint\">arrastar = girar &nbsp;·&nbsp; scroll = zoom &nbsp;·&nbsp; botão direito = mover<\u002Fdiv>\n\n<script src=\"04fffb7e-3741-4f64-a0a0-a6ec65f557fd\"><\u002Fscript>\n<script src=\"67d826db-e32b-4c65-94a8-c3eec1453671\"><\u002Fscript>\n<script>\n(function(){\n  const L = 12.03, W = 2.35, H = 2.69, HW = W/2;\n\n  const app = document.getElementById('app');\n  const renderer = new THREE.WebGLRenderer({ antialias:true });\n  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));\n  renderer.setSize(innerWidth, innerHeight);\n  renderer.shadowMap.enabled = true;\n  renderer.shadowMap.type = THREE.PCFSoftShadowMap;\n  renderer.outputEncoding = THREE.sRGBEncoding;\n  app.appendChild(renderer.domElement);\n\n  const scene = new THREE.Scene();\n  scene.background = new THREE.Color(0x17181b);\n  scene.fog = new THREE.Fog(0x17181b, 16, 34);\n\n  const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.05, 100);\n  camera.position.set(-3.4, 2.0, 2.8);\n\n  const controls = new THREE.OrbitControls(camera, renderer.domElement);\n  controls.target.set(4.5, 1.1, 0);\n  controls.enableDamping = true;\n  controls.dampingFactor = 0.08;\n  controls.maxDistance = 14;\n  controls.minDistance = 0.4;\n  controls.maxPolarAngle = Math.PI * 0.55;\n\n  // ---------- textures ----------\n  function canvasTex(w, h, draw, repX, repY){\n    const c = document.createElement('canvas'); c.width = w; c.height = h;\n    draw(c.getContext('2d'), w, h);\n    const t = new THREE.CanvasTexture(c);\n    t.wrapS = t.wrapT = THREE.RepeatWrapping;\n    t.repeat.set(repX, repY);\n    return t;\n  }\n  const corrTex = canvasTex(64, 64, (g,w,h)=>{\n    for(let x=0; x<w; x++){\n      const s = Math.sin(x/w * Math.PI*2 * 4);\n      const v = 78 + s*12;\n      g.fillStyle = 'rgb('+(v)+','+(v+3)+','+(v+8)+')';\n      g.fillRect(x,0,1,h);\n    }\n  }, 24, 1);\n  const corrTexEnd = corrTex.clone(); corrTexEnd.needsUpdate = true; corrTexEnd.repeat.set(5,1);\n  const floorTex = canvasTex(128, 128, (g,w,h)=>{\n    g.fillStyle = '#3a3d43'; g.fillRect(0,0,w,h);\n    g.fillStyle = 'rgba(255,255,255,0.045)';\n    g.fillRect(0,0,2,h);\n    g.fillStyle = 'rgba(0,0,0,0.18)';\n    g.fillRect(64,0,1,h);\n  }, 12, 2.5);\n  const pegTex = canvasTex(96, 96, (g,w,h)=>{\n    g.fillStyle = '#33363c'; g.fillRect(0,0,w,h);\n    g.fillStyle = '#5a5f66';\n    for(let x=8; x<w; x+=16) for(let y=8; y<h; y+=16){ g.beginPath(); g.arc(x,y,2.4,0,7); g.fill(); }\n  }, 6, 1.6);\n\n  // ---------- materials ----------\n  const matWall  = new THREE.MeshStandardMaterial({ map: corrTex, roughness:0.75, metalness:0.35 });\n  const matWallEnd = new THREE.MeshStandardMaterial({ map: corrTexEnd, roughness:0.75, metalness:0.35 });\n  const matFloor = new THREE.MeshStandardMaterial({ map: floorTex, roughness:0.9, metalness:0.05 });\n  const matCeil  = new THREE.MeshStandardMaterial({ color:0x43464c, roughness:0.9 });\n  const matWood  = new THREE.MeshStandardMaterial({ color:0xb08355, roughness:0.65 });\n  const matSteel = new THREE.MeshStandardMaterial({ color:0x26282c, roughness:0.6, metalness:0.4 });\n  const matSteelL= new THREE.MeshStandardMaterial({ color:0x3d4046, roughness:0.55, metalness:0.5 });\n  const matWhite = new THREE.MeshStandardMaterial({ color:0xcfd4da, roughness:0.45 });\n  const matPeg   = new THREE.MeshStandardMaterial({ map: pegTex, roughness:0.8 });\n  const matLED   = new THREE.MeshBasicMaterial({ color:0xffe4b3 });\n  const matGround= new THREE.MeshStandardMaterial({ color:0x141517, roughness:1 });\n  const colorMats = {};\n  function cmat(hex){ if(!colorMats[hex]) colorMats[hex] = new THREE.MeshStandardMaterial({ color:hex, roughness:0.55 }); return colorMats[hex]; }\n\n  function box(w,h,d,mat,x,y,z,parent){\n    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);\n    m.position.set(x,y,z); m.castShadow = true; m.receiveShadow = true;\n    (parent||scene).add(m); return m;\n  }\n\n  // ---------- shell ----------\n  const ground = new THREE.Mesh(new THREE.CircleGeometry(28, 48), matGround);\n  ground.rotation.x = -Math.PI/2; ground.position.y = -0.09; ground.receiveShadow = true;\n  scene.add(ground);\n\n  const floor = new THREE.Mesh(new THREE.PlaneGeometry(L, W), matFloor);\n  floor.rotation.x = -Math.PI/2; floor.position.set(L/2, 0, 0); floor.receiveShadow = true;\n  scene.add(floor);\n\n  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(L, W), matCeil);\n  ceil.rotation.x = Math.PI/2; ceil.position.set(L/2, H, 0);\n  scene.add(ceil);\n\n  const wallL = new THREE.Mesh(new THREE.PlaneGeometry(L, H), matWall);\n  wallL.position.set(L/2, H/2, -HW); wallL.receiveShadow = true;\n  scene.add(wallL);\n\n  const wallR = new THREE.Mesh(new THREE.PlaneGeometry(L, H), matWall);\n  wallR.rotation.y = Math.PI; wallR.position.set(L/2, H/2, HW); wallR.receiveShadow = true;\n  scene.add(wallR);\n\n  const wallB = new THREE.Mesh(new THREE.PlaneGeometry(W, H), matWallEnd);\n  wallB.rotation.y = -Math.PI/2; wallB.position.set(L, H/2, 0); wallB.receiveShadow = true;\n  scene.add(wallB);\n\n  // doors (open outward)\n  [[-1, -2.15],[1, 2.15]].forEach(([side, ang])=>{\n    const pivot = new THREE.Group();\n    pivot.position.set(0, H/2, side*HW);\n    const leaf = box(0.06, H, HW, matWall.clone(), 0, 0, -side*HW/2, pivot);\n    leaf.material = new THREE.MeshStandardMaterial({ map: corrTexEnd, roughness:0.75, metalness:0.35 });\n    box(0.04, 0.5, 0.05, matSteelL, 0.05, 0, -side*HW*0.8, pivot); // lock bar bit\n    pivot.rotation.y = side<0 ? -2.9 : 2.9;\n    scene.add(pivot);\n  });\n\n  // ---------- bancada (left wall x 0.4–3.4) ----------\n  box(3.0, 0.05, 0.7, matWood, 1.9, 0.9, -HW+0.35);                 // counter\n  box(2.94, 0.8, 0.6, matSteel, 1.9, 0.46, -HW+0.34);               // cabinet\n  // 9 gavetas (3 × 3)\n  [0.92, 1.9, 2.88].forEach(x=> [0.72, 0.46, 0.20].forEach(y=>{\n    box(0.92, 0.235, 0.02, matSteelL, x, y, -HW+0.65);\n    box(0.32, 0.022, 0.022, matSteel, x, y+0.07, -HW+0.665);\n  }));\n  const peg = box(3.0, 0.75, 0.025, matPeg, 1.9, 1.325, -HW+0.02);  // pegboard\n  // tools on pegboard\n  [[1.0,1.45,0x8a3030],[1.45,1.2,0x565b63],[1.9,1.5,0x3f5a7d],[2.4,1.3,0xb08355],[2.8,1.45,0x4a6b4a]].forEach(([x,y,c])=>\n    box(0.06, 0.22, 0.04, cmat(c), x, y, -HW+0.06));\n  box(3.0, 0.03, 0.07, matLED, 1.9, 1.79, -HW+0.14);                // LED strip\n  const ledL1 = new THREE.PointLight(0xffdfae, 0.55, 3.5); ledL1.position.set(1.2, 1.7, -HW+0.5); scene.add(ledL1);\n  const ledL2 = new THREE.PointLight(0xffdfae, 0.55, 3.5); ledL2.position.set(2.6, 1.7, -HW+0.5); scene.add(ledL2);\n\n  // ---------- aeromodelos na parede esquerda (pendurados de nariz para cima) ----------\n  const matGlass = new THREE.MeshStandardMaterial({ color:0x15171a, roughness:0.25, metalness:0.6 });\n  const matAlu = new THREE.MeshStandardMaterial({ color:0xd7dbe0, roughness:0.35, metalness:0.55 });\n\n  function planformMesh(pts, depth, mat){\n    const s = new THREE.Shape();\n    s.moveTo(pts[0][0], pts[0][1]);\n    for(let i=1;i<pts.length;i++) s.lineTo(pts[i][0], pts[i][1]);\n    const geo = new THREE.ExtrudeGeometry(s, { depth: depth, bevelEnabled:false });\n    const m = new THREE.Mesh(geo, mat);\n    m.castShadow = true;\n    return m;\n  }\n  function latheMesh(profile, mat){\n    const pts = profile.map(p=>new THREE.Vector2(p[0], p[1]));\n    const m = new THREE.Mesh(new THREE.LatheGeometry(pts, 22), mat);\n    m.castShadow = true;\n    return m;\n  }\n\n  // P-51 — envergadura 1,8 m, pendurado de nariz para cima (barriga na parede)\n  function warbird(cx, cy, accent){\n    const g = new THREE.Group();\n    const acc = cmat(accent);\n    g.add(latheMesh([[0.012,-0.75],[0.03,-0.62],[0.055,-0.35],[0.078,0],[0.086,0.3],[0.079,0.5],[0.06,0.66],[0.048,0.7]], matAlu));\n    const spin = new THREE.Mesh(new THREE.ConeGeometry(0.048, 0.15, 14), acc);\n    spin.position.y = 0.77; spin.castShadow = true; g.add(spin);\n    [0.4, -0.4].forEach(a=>{ const b = box(0.72, 0.024, 0.05, matSteel, 0, 0.71, 0, g); b.rotation.y = a; }); // hélice 4 pás\n    const cano = new THREE.Mesh(new THREE.SphereGeometry(0.065, 14, 10), matGlass);\n    cano.scale.set(0.8, 1.9, 0.9); cano.position.set(0, 0.12, 0.05); g.add(cano); // bolha\n    box(0.09, 0.32, 0.05, matAlu, 0, -0.12, -0.07, g); // radiador ventral (lado da parede)\n    const wing = planformMesh([[-0.9,0.05],[0,0.17],[0.9,0.05],[0.9,-0.09],[0,-0.17],[-0.9,-0.09]], 0.032, matAlu);\n    wing.position.set(0, 0.16, 0.028); g.add(wing); // asa trapezoidal 1,80 m\n    box(0.1, 0.14, 0.037, acc, -0.85, 0.145, 0.045, g);\n    box(0.1, 0.14, 0.037, acc,  0.85, 0.145, 0.045, g);\n    const stab = planformMesh([[-0.31,0.03],[0,0.09],[0.31,0.03],[0.31,-0.05],[0,-0.09],[-0.31,-0.05]], 0.024, matAlu);\n    stab.position.set(0, -0.6, 0.02); g.add(stab);\n    const fin = planformMesh([[0,0],[0.2,0],[0.16,0.24],[0.07,0.26],[0.015,0.1]], 0.022, matAlu);\n    fin.geometry.rotateZ(-Math.PI/2); fin.geometry.rotateY(-Math.PI/2);\n    fin.position.set(0, -0.5, 0.04); g.add(fin);\n    const band = new THREE.Mesh(new THREE.CylinderGeometry(0.046, 0.054, 0.07, 14), acc);\n    band.position.y = -0.42; g.add(band); // faixa da cauda\n    box(0.05, 0.06, 0.1, matSteel, -0.5, 0.16, -0.06, g);\n    box(0.05, 0.06, 0.1, matSteel,  0.5, 0.16, -0.06, g);\n    g.position.set(cx, cy, -HW+0.15);\n    scene.add(g);\n  }\n\n  // jato esporte (estilo Rebel Pro / Ultra Flash) — pendurado vertical\n  function jet(cx, cy, accent){\n    const g = new THREE.Group();\n    const acc = cmat(accent);\n    g.add(latheMesh([[0.028,-0.85],[0.05,-0.7],[0.07,-0.3],[0.075,0.1],[0.064,0.5],[0.04,0.75],[0.006,0.95]], matWhite));\n    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.041, 0.26, 14), acc);\n    nose.position.y = 0.83; g.add(nose);\n    const cano = new THREE.Mesh(new THREE.SphereGeometry(0.058, 14, 10), matGlass);\n    cano.scale.set(0.75, 2.1, 0.9); cano.position.set(0, 0.38, 0.048); g.add(cano);\n    box(0.05, 0.3, 0.06, matSteel, -0.09, 0.02, 0.01, g); // entradas de ar\n    box(0.05, 0.3, 0.06, matSteel,  0.09, 0.02, 0.01, g);\n    const wing = planformMesh([[-0.8,-0.07],[0,0.26],[0.8,-0.07],[0.8,-0.26],[0,-0.12],[-0.8,-0.26]], 0.03, matWhite);\n    wing.position.set(0, -0.24, 0.026); g.add(wing); // asa enflechada\n    box(0.09, 0.2, 0.035, acc, -0.76, -0.4, 0.042, g);\n    box(0.09, 0.2, 0.035, acc,  0.76, -0.4, 0.042, g);\n    const stab = planformMesh([[-0.3,-0.02],[0,0.1],[0.3,-0.02],[0.3,-0.12],[0,-0.06],[-0.3,-0.12]], 0.022, matWhite);\n    stab.position.set(0, -0.72, 0.02); g.add(stab);\n    const fin = planformMesh([[0,0],[0.26,0],[0.35,0.26],[0.27,0.28],[0.09,0.12]], 0.02, acc);\n    fin.geometry.rotateZ(-Math.PI/2); fin.geometry.rotateY(-Math.PI/2);\n    fin.position.set(0, -0.55, 0.03); g.add(fin);\n    const noz = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.038, 0.08, 12), matSteel);\n    noz.position.y = -0.88; g.add(noz);\n    box(0.05, 0.06, 0.1, matSteel, -0.3, -0.2, -0.05, g);\n    box(0.05, 0.06, 0.1, matSteel,  0.3, -0.2, -0.05, g);\n    g.position.set(cx, cy, -HW+0.15);\n    scene.add(g);\n  }\n\n  warbird(4.6, 1.5, 0x8a3030);   // P-51 spinner vermelho\n  warbird(6.5, 1.5, 0x3f5a7d);   // P-51 spinner azul\n  jet(8.4, 1.45, 0xe07a3f);      // jato laranja\n  jet(10.3, 1.45, 0x4a6b4a);     // jato verde\n\n  // ---------- fuselagens de 2 m (tipo T-6) nos trilhos da parede direita ----------\n  const railZ = HW - 0.30;\n  box(9.85, 0.035, 0.035, matSteelL, 5.82, 2.07, railZ);\n  box(9.85, 0.035, 0x3f5a7d);\n  t6(9.4, 1.12, 1.40, 0xcfd4da, 0x7d5c3c);\n\n  // ---------- prateleiras de modelos (parede direita x 8.58–10.61) ----------\n  function shelfUnit(x0, x1, z, depth, ys, parentColorSeed){\n    const wdt = x1-x0, cx = (x0+x1)/2;\n    box(0.035, ys[ys.length-1]-0.02, depth, matSteel, x0+0.02, (ys[ys.length-1])/2, z);\n    box(0.035, ys[ys.length-1]-0.02, depth, matSteel, x1-0.02, (ys[ys.length-1])/2, z);\n    ys.forEach((y,i)=>{\n      box(wdt, 0.03, depth, matSteelL, cx, y, z);\n      if(i < ys.length-1){\n        // small models sitting on shelf\n        const n = 2 + (i % 2);\n        for(let k=0;k<n;k++){\n          const mx = x0 + 0.25 + k*(wdt-0.5)/Math.max(1,n-1) + ((i*7+k*13)%10)/100;\n          const c = [0x3f5a7d,0x8a3030,0x4a6b4a,0xb08355,0x565b63][(i*3+k+parentColorSeed)%5];\n          if((i+k)%2===0) box(0.34, 0.07, 0.09, cmat(c), mx, y+0.05, z);\n          else {\n            const f = new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,0.42,10), cmat(c));\n            f.rotation.z = Math.PI/2; f.position.set(mx, y+0.06, z); f.castShadow = true; scene.add(f);\n          }\n        }\n      }\n    });\n  }\n  // ---------- fundo: estante + frigobar ----------\n  (function backShelf(){\n    const z0 = -1.0, z1 = 0.27, cz = (z0+z1)/2, wdt = z1-z0;\n    const x = L - 0.19, depth = 0.34;\n    const ys = [0.3, 0.8, 1.3, 1.8, 2.3];\n    box(depth, 2.06, 0.035, matSteel, x, 1.32, z0+0.02);\n    box(depth, 2.06, 0.035, matSteel, x, 1.32, z1-0.02);\n    ys.forEach((y,i)=>{\n      box(depth, 0.03, wdt, matSteelL, x, y, cz);\n      if(i < ys.length-1){\n        for(let k=0;k<2;k++){\n          const mz = z0 + 0.3 + k*0.6 + ((i*5+k)%8)/100;\n          const c = [0x3f5a7d,0x8a3030,0x4a6b4a,0xb08355][(i+k)%4];\n          if((i+k)%2===0) box(0.09, 0.07, 0.3, cmat(c), x, y+0.05, mz);\n          else {\n            const f = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.36,10), cmat(c));\n            f.rotation.x = Math.PI/2; f.position.set(x, y+0.055, mz); f.castShadow = true; scene.add(f);\n          }\n        }\n      }\n    });\n  })();\n  const frig = box(0.55, 0.91, 0.62, matSteelL, L-0.29, 0.455, 0.69);\n  box(0.03, 0.3, 0.04, matSteel, L-0.58, 0.55, 0.44); // handle\n  const frigLogo = box(0.02, 0.06, 0.12, cmat(0xe07a3f), L-0.575, 0.82, 0.69);\n\n  // ---------- ceiling lights ----------\n  [2.6, 6.0, 9.4].forEach(x=>{\n    box(1.1, 0.025, 0.1, matLED, x, H-0.02, 0);\n    const p = new THREE.PointLight(0xfff2dd, 0.5, 5.5, 2);\n    p.position.set(x, H-0.35, 0);\n    scene.add(p);\n  });\n\n  // ---------- exterior light ----------\n  scene.add(new THREE.AmbientLight(0x8a93a8, 0.38));\n  const sun = new THREE.DirectionalLight(0xfff0dd, 0.85);\n  sun.position.set(-6, 5, 3);\n  sun.target.position.set(4, 0, 0);\n  sun.castShadow = true;\n  sun.shadow.mapSize.set(2048, 2048);\n  sun.shadow.camera.left = -8; sun.shadow.camera.right = 14;\n  sun.shadow.camera.top = 8; sun.shadow.camera.bottom = -4;\n  scene.add(sun, sun.target);\n\n  // ---------- camera presets ----------\n  const views = {\n    porta:    { pos:[-3.4, 2.0, 2.8],  tgt:[4.5, 1.1, 0] },\n    bancada:  { pos:[3.1, 1.55, 0.9],  tgt:[1.7, 1.0, -1.1] },\n    esquerda: { pos:[6.8, 1.5, 0.85],  tgt:[6.6, 1.5, -1.17] },\n    direita:  { pos:[4.6, 1.5, -0.85], tgt:[5.6, 1.5, 1.17] },\n    fundo:    { pos:[9.4, 1.5, 0.6],   tgt:[12.0, 1.2, -0.2] },\n    cima:     { pos:[6.0, 9.5, 0.02],  tgt:[6.0, 0, 0] }\n  };\n  let goalPos = null, goalTgt = null;\n  document.querySelectorAll('#views button').forEach(b=>{\n    b.addEventListener('click', ()=>{\n      document.querySelectorAll('#views button').forEach(x=>x.classList.remove('active'));\n      b.classList.add('active');\n      const v = views[b.dataset.v];\n      goalPos = new THREE.Vector3(...v.pos);\n      goalTgt = new THREE.Vector3(...v.tgt);\n    });\n  });\n  controls.addEventListener('start', ()=>{ goalPos = null; goalTgt = null; });\n\n  addEventListener('resize', ()=>{\n    camera.aspect = innerWidth/innerHeight;\n    camera.updateProjectionMatrix();\n    renderer.setSize(innerWidth, innerHeight);\n  });\n\n  (function loop(){\n    requestAnimationFrame(loop);\n    if(goalPos){\n      camera.position.lerp(goalPos, 0.07);\n      controls.target.lerp(goalTgt, 0.07);\n      if(camera.position.distanceTo(goalPos) < 0.02){ goalPos = null; goalTgt = null; }\n    }\n    controls.update();\n    renderer.render(scene, camera);\n  })();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
